<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomalies - ESG Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">📊 ESG Dashboard</div>
        <ul class="nav-links">
            <li><a href="../index.html">Dashboard</a></li>
            <li><a href="companies.html">Companies</a></li>
            <li><a href="anomalies.html" class="active">Anomalies</a></li>
            <li><a href="upload.html">Upload</a></li>
            <li><a href="compare.html">Compare</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">Detected Anomalies</h1>

        <div class="section">
            <div style="display:flex; gap:15px; flex-wrap:wrap;">
                <input type="text" id="searchInput" placeholder="🔍 Search company..."
                    style="flex:1; padding:10px 15px; border:1px solid #ddd; border-radius:8px; font-size:0.95rem;">
                <select id="severityFilter"
                    style="padding:10px 15px; border:1px solid #ddd; border-radius:8px; font-size:0.95rem;">
                    <option value="">All Severities</option>
                    <option value="HIGH">🔴 High</option>
                    <option value="MEDIUM">🟡 Medium</option>
                    <option value="LOW">🟢 Low</option>
                </select>
                <select id="metricFilter"
                    style="padding:10px 15px; border:1px solid #ddd; border-radius:8px; font-size:0.95rem;">
                    <option value="">All Metrics</option>
                    <option value="environmental">Environmental</option>
                    <option value="social">Social</option>
                    <option value="governance">Governance</option>
                </select>
            </div>
        </div>

        <div style="display:flex; gap:15px; margin-bottom:25px; flex-wrap:wrap;">
            <div class="card" style="flex:1;">
                <div class="card-icon">🔴</div>
                <div class="card-info">
                    <h3 id="highCount">-</h3>
                    <p>High Severity</p>
                </div>
            </div>
            <div class="card" style="flex:1;">
                <div class="card-icon">🟡</div>
                <div class="card-info">
                    <h3 id="mediumCount">-</h3>
                    <p>Medium Severity</p>
                </div>
            </div>
            <div class="card" style="flex:1;">
                <div class="card-icon">🟢</div>
                <div class="card-info">
                    <h3 id="lowCount">-</h3>
                    <p>Low Severity</p>
                </div>
            </div>
        </div>

        <div class="section">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Sector</th>
                        <th>Metric</th>
                        <th>Severity</th>
                        <th>Reason</th>
                    </tr>
                </thead>
                <tbody id="anomaliesTable">
                    <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/anomalies.js"></script>
</body>
</html>
