<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomalies - ESG Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">📊 ESG Dashboard</div>
        <ul class="nav-links">
            <li><a href="../index.html">Dashboard</a></li>
            <li><a href="companies.html">Companies</a></li>
            <li><a href="anomalies.html" class="active">Anomalies</a></li>
            <li><a href="upload.html">Upload</a></li>
            <li><a href="compare.html">Compare</a></li>
            <li><a href="add-company.html">Add Company</a></li>
            <li><a href="thresholds.html">Thresholds</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">Detected Anomalies</h1>

        <!-- Stat Cards -->
        <div class="stat-cards">
            <div class="stat-card">
                <div class="stat-card-icon">⚠️</div>
                <div class="stat-card-info">
                    <h3 id="highCount" style="color:#a78bfa;">—</h3>
                    <p>Suspicious</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">🔴</div>
                <div class="stat-card-info">
                    <h3 id="mediumCount" style="color:#ff8c5a;">—</h3>
                    <p>Poor Performing</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">🟢</div>
                <div class="stat-card-info">
                    <h3 id="lowCount" style="color:#00f5a0;">—</h3>
                    <p>Good Performing</p>
                </div>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="section">
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search company...">
                <select id="severityFilter">
                    <option value="">All Categories</option>
                    <option value="SUSPICIOUS">⚠️ Suspicious</option>
                    <option value="POOR">🔴 Poor</option>
                    <option value="GOOD">🟢 Good</option>
                </select>
                <select id="metricFilter">
                    <option value="">All Metrics</option>
                    <option value="environmental">🌱 Environmental</option>
                    <option value="social">👥 Social</option>
                    <option value="governance">🏛️ Governance</option>
                </select>
            </div>
        </div>

        <!-- Anomalies Table -->
        <div class="section">
            <h2>All Flagged Entries</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Sector</th>
                        <th>Metric</th>
                        <th>Category</th>
                        <th>Reason</th>
                    </tr>
                </thead>
                <tbody id="anomaliesTable">
                    <tr>
                        <td colspan="5" style="text-align:center; padding:40px; color:var(--text-muted);">
                            <div class="spinner" style="margin:0 auto 12px;"></div>
                            Loading anomalies...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/anomalies.js"></script>
</body>
</html>
