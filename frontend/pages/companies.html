<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies - ESG Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">📊 ESG Dashboard</div>
        <ul class="nav-links">
            <li><a href="../index.html">Dashboard</a></li>
            <li><a href="companies.html" class="active">Companies</a></li>
            <li><a href="anomalies.html">Anomalies</a></li>
            <li><a href="upload.html">Upload</a></li>
            <li><a href="compare.html">Compare</a></li>
            <li><a href="add-company.html">Add Company</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">Companies</h1>

        <!-- Search and Filter -->
        <div class="section">
            <div style="display:flex; gap:15px; flex-wrap:wrap;">
                <input type="text" id="searchInput" placeholder="🔍 Search company..."
                    style="flex:1; padding:10px 15px; border:1px solid #ddd; border-radius:8px; font-size:0.95rem;">
                <select id="sectorFilter"
                    style="padding:10px 15px; border:1px solid #ddd; border-radius:8px; font-size:0.95rem;">
                    <option value="">All Sectors</option>
                </select>
            </div>
        </div>

        <!-- Companies Table -->
        <div class="section">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Sector</th>
                        <th>Country</th>
                        <th>Avg ESG Score</th>
                        <th>Anomalies</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="companiesTable">
                    <tr><td colspan="7" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%;
         height:100%; background:rgba(0,0,0,0.5); z-index:1000; overflow:auto;">
        <div style="background:white; margin:50px auto; padding:30px;
             border-radius:12px; max-width:600px; position:relative;">
            <h2 style="margin-bottom:20px;">✏️ Edit Company</h2>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="editName">
                </div>
                <div class="form-group">
                    <label>Sector</label>
                    <input type="text" id="editSector">
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" id="editCountry">
                </div>
                <div class="form-group">
                    <label>Year</label>
                    <input type="text" id="editYear">
                </div>
                <div class="form-group">
                    <label>🌱 Environmental Score</label>
                    <input type="number" id="editEnv">
                </div>
                <div class="form-group">
                    <label>👥 Social Score</label>
                    <input type="number" id="editSoc">
                </div>
                <div class="form-group">
                    <label>🏛️ Governance Score</label>
                    <input type="number" id="editGov">
                </div>
                <div class="form-group">
                    <label>📊 Total Score</label>
                    <input type="number" id="editTotal">
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" onclick="saveEdit()">💾 Save Changes</button>
                <button class="btn" onclick="closeModal()"
                    style="background:#eee; color:#333;">Cancel</button>
            </div>

            <div id="editResult" style="display:none; margin-top:15px;"></div>
        </div>
    </div>

    <script src="../js/companies.js"></script>
</body>
</html>
