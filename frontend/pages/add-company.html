<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Company - ESG Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">📊 ESG Dashboard</div>
        <ul class="nav-links">
            <li><a href="../index.html">Dashboard</a></li>
            <li><a href="companies.html">Companies</a></li>
            <li><a href="anomalies.html">Anomalies</a></li>
            <li><a href="upload.html">Upload</a></li>
            <li><a href="compare.html">Compare</a></li>
            <li><a href="add-company.html" class="active">Add Company</a></li>
            <li><a href="thresholds.html">Thresholds</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">Add Company Manually</h1>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">

            <!-- Add Form -->
            <div class="section">
                <h2>Company Details</h2>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
                    <div class="form-group">
                        <label>Company Name *</label>
                        <input type="text" id="name" placeholder="e.g. Tesla Inc">
                    </div>
                    <div class="form-group">
                        <label>Sector *</label>
                        <input type="text" id="sector" placeholder="e.g. Technology">
                    </div>
                    <div class="form-group">
                        <label>Exchange / Country</label>
                        <input type="text" id="country" placeholder="e.g. NASDAQ">
                    </div>
                    <div class="form-group">
                        <label>Year *</label>
                        <input type="text" id="year" placeholder="e.g. 2024">
                    </div>
                </div>

                <div style="height:1px; background:var(--border); margin:16px 0;"></div>
                <p style="font-family:'Syne',sans-serif; font-size:0.85rem; font-weight:600;
                    color:var(--text-secondary); margin-bottom:14px; text-transform:uppercase;
                    letter-spacing:0.06em;">ESG Scores (0–100)</p>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
                    <div class="form-group">
                        <label>🌱 Environmental Score *</label>
                        <input type="number" id="envScore" placeholder="e.g. 25.5" min="0" max="100" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>👥 Social Score *</label>
                        <input type="number" id="socScore" placeholder="e.g. 18.2" min="0" max="100" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>🏛️ Governance Score *</label>
                        <input type="number" id="govScore" placeholder="e.g. 20.1" min="0" max="100" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>📊 Total Score *</label>
                        <input type="number" id="totalScore" placeholder="e.g. 63.8" min="0" max="100" step="0.1">
                    </div>
                </div>

                <button class="btn btn-primary" onclick="addCompany()" style="width:100%; justify-content:center; margin-top:4px;">
                    ➕ Add Company & Detect Anomalies
                </button>

                <div id="resultArea" style="display:none; margin-top:16px;"></div>
            </div>

            <!-- Recently Added -->
            <div class="section">
                <h2>Recently Added</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Sector</th>
                            <th>Total</th>
                            <th>Anomalies</th>
                        </tr>
                    </thead>
                    <tbody id="recentTable">
                        <tr>
                            <td colspan="4" style="text-align:center; color:var(--text-muted); padding:32px;">
                                No manually added companies yet
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="../js/add-company.js"></script>
</body>
</html>
