<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare - ESG Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">📊 ESG Dashboard</div>
        <ul class="nav-links">
            <li><a href="../index.html">Dashboard</a></li>
            <li><a href="companies.html">Companies</a></li>
            <li><a href="anomalies.html">Anomalies</a></li>
            <li><a href="upload.html">Upload</a></li>
            <li><a href="compare.html" class="active">Compare</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">Compare Companies</h1>

        <!-- Select Companies -->
        <div class="section">
            <div style="display:flex; gap:15px; flex-wrap:wrap; align-items:flex-end;">
                <div style="flex:1;">
                    <label style="display:block; margin-bottom:8px; font-weight:bold; color:#555;">Company 1</label>
                    <select id="company1" style="width:100%; padding:10px 15px; border:1px solid #ddd; border-radius:8px; font-size:0.95rem;">
                        <option value="">Select Company...</option>
                    </select>
                </div>
                <div style="flex:1;">
                    <label style="display:block; margin-bottom:8px; font-weight:bold; color:#555;">Company 2</label>
                    <select id="company2" style="width:100%; padding:10px 15px; border:1px solid #ddd; border-radius:8px; font-size:0.95rem;">
                        <option value="">Select Company...</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="compareCompanies()">Compare</button>
            </div>
        </div>

        <!-- Results -->
        <div id="resultsArea" style="display:none;">
            <!-- Radar Chart -->
            <div class="section">
                <h2>ESG Score Comparison</h2>
                <div style="max-width:500px; margin:0 auto;">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <!-- Score Cards -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div class="section" id="company1Details">
                    <h2 id="company1Name">Company 1</h2>
                    <table class="data-table" style="margin-top:15px;">
                        <thead>
                            <tr>
                                <th>Metric</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody id="company1Table"></tbody>
                    </table>
                </div>
                <div class="section" id="company2Details">
                    <h2 id="company2Name">Company 2</h2>
                    <table class="data-table" style="margin-top:15px;">
                        <thead>
                            <tr>
                                <th>Metric</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody id="company2Table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/compare.js"></script>
</body>
</html>
