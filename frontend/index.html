<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG Anomaly Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">📊 ESG Dashboard</div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Dashboard</a></li>
            <li><a href="pages/companies.html">Companies</a></li>
            <li><a href="pages/anomalies.html">Anomalies</a></li>
            <li><a href="pages/upload.html">Upload</a></li>
            <li><a href="pages/compare.html">Compare</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="page-title">Dashboard Overview</h1>

        <div class="cards-grid">
            <div class="card">
                <div class="card-icon">🏢</div>
                <div class="card-info">
                    <h3 id="totalCompanies">-</h3>
                    <p>Total Companies</p>
                </div>
            </div>
            <div class="card">
                <div class="card-icon">🚨</div>
                <div class="card-info">
                    <h3 id="totalAnomalies">-</h3>
                    <p>Anomalies Detected</p>
                </div>
            </div>
            <div class="card">
                <div class="card-icon">📈</div>
                <div class="card-info">
                    <h3 id="avgScore">-</h3>
                    <p>Average ESG Score(1-100)</p>
                </div>
            </div>
            <div class="card">
                <div class="card-icon">🔴</div>
                <div class="card-info">
                    <h3 id="highRisk">-</h3>
                    <p>High Risk Companies</p>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Top Flagged Companies</h2>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Company</th>
                        <th>Anomalies Found</th>
                    </tr>
                </thead>
                <tbody id="topFlaggedTable">
                    <tr><td colspan="2">No data yet — upload a CSV to get started</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
